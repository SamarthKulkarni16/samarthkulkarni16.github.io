<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Perspective — Samarth Kulkarni</title>
<meta name="description" content="Websites and apps by Samarth Kulkarni.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="icon" href="favicon.ico" sizes="any">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="icon" type="image/png" sizes="192x192" href="favicon-192.png">
<link rel="apple-touch-icon" sizes="180x180" href="favicon-180.png">
<style>
  :root{
    --ink:#f2f2ee;
    --page:#0a0a0a;
    --mute: rgba(242,242,238,0.42);
    --hair: rgba(242,242,238,0.16);
  }

  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}

  html,body{ height:100%; margin:0; overflow:hidden; }

  body{
    height:100dvh;
    width:100vw;
    background:var(--page);
    color:var(--ink);
    display:flex;
    flex-direction:column;
    align-items:center;
    font-family:'JetBrains Mono', monospace;
  }

  @media (prefers-reduced-motion: no-preference){
    .row, .num, .arrow{ transition: opacity .3s ease, color .3s ease, transform .3s ease; }
  }

  .page{
    width:100%;
    height:100%;
    max-width:520px;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:space-between;
    padding: clamp(1.1rem, 4.5vh, 2.6rem) clamp(1.2rem, 6vw, 1.6rem);
  }

  .mark{
    font-family:'Fraunces', serif;
    font-style:italic;
    font-weight:400;
    font-size: clamp(1.1rem, 2.6vh, 1.4rem);
    letter-spacing:0.02em;
    color:var(--ink);
  }

  main{
    flex:1;
    width:100%;
    display:flex;
    flex-direction:column;
    justify-content:center;
    gap: clamp(0.9rem, 3vh, 1.6rem);
  }

  .kind{
    font-size: clamp(0.58rem, 1.1vh, 0.66rem);
    letter-spacing:0.22em;
    text-transform:uppercase;
    color:var(--mute);
    margin-bottom: clamp(0.2rem, 0.8vh, 0.4rem);
  }

  .rows{
    border-top:0.5px solid var(--hair);
  }

  .row{
    display:flex;
    align-items:baseline;
    gap:clamp(0.7rem, 2vw, 1rem);
    text-decoration:none;
    color:var(--ink);
    padding: clamp(0.4rem, 1.5vh, 0.65rem) 0;
    border-bottom:0.5px solid var(--hair);
  }

  .num{
    font-size: clamp(0.6rem, 1.1vh, 0.7rem);
    color:var(--mute);
    flex:0 0 auto;
    font-variant-numeric: tabular-nums;
  }

  .row-name{
    flex:1;
    font-family:'Fraunces', serif;
    font-style:italic;
    font-weight:400;
    font-size: clamp(0.92rem, 2vh, 1.1rem);
  }

  .kind--apps .row-name{
    font-family:'JetBrains Mono', monospace;
    font-style:normal;
    font-weight:400;
    letter-spacing:-0.01em;
    font-size: clamp(0.8rem, 1.7vh, 0.95rem);
  }

  .arrow{
    flex:0 0 auto;
    font-size:0.8em;
    color:var(--mute);
    opacity:0;
    transform:translate(-4px,4px) rotate(45deg);
  }

  .row:hover, .row:focus-visible{ color:var(--ink); }
  .row:hover .num, .row:focus-visible .num{ color:var(--ink); }
  .row:hover .arrow, .row:focus-visible .arrow{
    opacity:1;
    transform:translate(0,0) rotate(45deg);
  }
  .row:focus-visible{ outline:1px solid var(--mute); outline-offset:-2px; }

  footer{
    font-size: clamp(0.56rem, 1.05vh, 0.64rem);
    letter-spacing:0.1em;
    text-transform:uppercase;
  }
  footer a{
    color:var(--mute);
    text-decoration:none;
  }
  footer a:hover{ color:var(--ink); }

  @media (max-height: 480px) and (orientation: landscape){
    main{ gap: clamp(0.5rem, 1.6vh, 0.9rem); }
    .row{ padding: 0.25rem 0; }
  }
</style>
</head>
<body>

<div class="page">
  <span class="mark">&nbsp;</span>

  <main>
    <div class="kind kind--websites">
      <div class="label kind">Websites</div>
      <div class="rows">
        <a class="row" href="https://samarthkulkarni16.github.io/perspective-library/" target="_blank" rel="noopener">
          <span class="num">01</span>
          <span class="row-name">Perspective Library</span>
          <span class="arrow" aria-hidden="true">↗</span>
        </a>
        <a class="row" href="https://samarthkulkarni16.github.io/perspective-audio/" target="_blank" rel="noopener">
          <span class="num">02</span>
          <span class="row-name">Perspective Audio</span>
          <span class="arrow" aria-hidden="true">↗</span>
        </a>
      </div>
    </div>

    <div class="kind kind--apps">
      <div class="label kind">Apps</div>
      <div class="rows">
        <a class="row" href="https://samarthkulkarni16.github.io/notes_app_for_you/" target="_blank" rel="noopener">
          <span class="num">03</span>
          <span class="row-name">Notes</span>
          <span class="arrow" aria-hidden="true">↗</span>
        </a>
        <a class="row" href="https://samarthkulkarni16.github.io/logs_app_for_you/" target="_blank" rel="noopener">
          <span class="num">04</span>
          <span class="row-name">Daily Logs</span>
          <span class="arrow" aria-hidden="true">↗</span>
        </a>
        <a class="row" href="https://samarthkulkarni16.github.io/To-Do_App_for_you/" target="_blank" rel="noopener">
          <span class="num">05</span>
          <span class="row-name">To Do</span>
          <span class="arrow" aria-hidden="true">↗</span>
        </a>
        <a class="row" href="https://samarthkulkarni16.github.io/flow_timer_for_you/" target="_blank" rel="noopener">
          <span class="num">06</span>
          <span class="row-name">Flow Timer</span>
          <span class="arrow" aria-hidden="true">↗</span>
        </a>
      </div>
    </div>
  </main>

  <footer>
    <a href="https://github.com/SamarthKulkarni16" target="_blank" rel="noopener">Samarth Kulkarni</a>
  </footer>
</div>

</body>
</html>
