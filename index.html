<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Perspective — Samarth Kulkarni</title>
<meta name="description" content="Free books, audiobooks, and apps by Samarth Kulkarni.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#161616;
    --paper:#fafaf8;
    --mute: rgba(22,22,22,0.42);
    --hair: rgba(22,22,22,0.14);
  }

  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}

  html,body{ height:100%; margin:0; overflow:hidden; }

  body{
    height:100dvh;
    width:100vw;
    background:var(--paper);
    color:var(--ink);
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    font-family:'JetBrains Mono', monospace;
  }

  @media (prefers-reduced-motion: no-preference){
    .row, .row::after{ transition: color .3s ease, opacity .3s ease; }
    .row .arrow{ transition: transform .3s ease, opacity .3s ease; }
  }

  .page{
    width:100%;
    height:100%;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:space-between;
    padding: clamp(1rem, 4vh, 2.4rem) clamp(1.2rem, 6vw, 2rem);
  }

  .mark{
    font-family:'Fraunces', serif;
    font-style:italic;
    font-weight:400;
    font-size: clamp(0.95rem, 2.2vh, 1.25rem);
    letter-spacing:0.01em;
    color:var(--ink);
  }

  main{
    flex:1;
    width:100%;
    max-width:420px;
    display:flex;
    flex-direction:column;
    justify-content:center;
    gap: clamp(1rem, 3.4vh, 1.8rem);
  }

  .group{
    display:flex;
    flex-direction:column;
    gap: clamp(0.45rem, 1.4vh, 0.7rem);
  }

  .label{
    font-size: clamp(0.55rem, 1.1vh, 0.64rem);
    letter-spacing:0.18em;
    text-transform:uppercase;
    color:var(--mute);
    margin-bottom:clamp(0.1rem,0.6vh,0.3rem);
  }

  .row{
    display:flex;
    align-items:baseline;
    justify-content:space-between;
    text-decoration:none;
    color:var(--ink);
    padding: clamp(0.15rem, 0.6vh, 0.3rem) 0;
  }

  .row-name{
    font-size: clamp(0.82rem, 1.9vh, 1rem);
  }

  .group--content .row-name{
    font-family:'Fraunces', serif;
    font-style:italic;
    font-weight:400;
    font-size: clamp(0.95rem, 2.2vh, 1.2rem);
  }

  .group--tools .row-name{
    font-family:'JetBrains Mono', monospace;
    font-weight:400;
    letter-spacing:-0.01em;
  }

  .arrow{
    font-size:0.85em;
    color:var(--mute);
    opacity:0;
    transform:translate(-4px,4px) rotate(45deg);
  }

  .row:hover, .row:focus-visible{ color:var(--ink); }
  .row:hover .row-name, .row:focus-visible .row-name{ opacity:1; }
  .row:hover .arrow, .row:focus-visible .arrow{
    opacity:1;
    transform:translate(0,0) rotate(45deg);
  }
  .row:focus-visible{ outline:1px solid var(--mute); outline-offset:6px; }

  hr.div{
    width:100%;
    max-width:420px;
    border:none;
    border-top:1px solid var(--hair);
    margin:0;
  }

  footer{
    font-size: clamp(0.56rem, 1.05vh, 0.66rem);
    letter-spacing:0.08em;
    text-transform:uppercase;
  }
  footer a{
    color:var(--mute);
    text-decoration:none;
  }
  footer a:hover{ color:var(--ink); }

  @media (max-height: 480px) and (orientation: landscape){
    main{ gap: clamp(0.6rem, 2vh, 1rem); }
    .group{ gap:0.3rem; }
  }
</style>
</head>
<body>

<div class="page">
  <span class="mark">Perspective</span>

  <main>
    <div class="group group--content">
      <div class="label">Content — updated monthly</div>
      <a class="row" href="https://samarthkulkarni16.github.io/perspective-library/" target="_blank" rel="noopener">
        <span class="row-name">Perspective Library</span>
        <span class="arrow" aria-hidden="true">↗</span>
      </a>
      <a class="row" href="https://samarthkulkarni16.github.io/perspective-audio/" target="_blank" rel="noopener">
        <span class="row-name">Perspective Audio</span>
        <span class="arrow" aria-hidden="true">↗</span>
      </a>
    </div>

    <hr class="div">

    <div class="group group--tools">
      <div class="label">Tools — free apps</div>
      <a class="row" href="https://samarthkulkarni16.github.io/notes_app_for_you/" target="_blank" rel="noopener">
        <span class="row-name">Notes</span>
        <span class="arrow" aria-hidden="true">↗</span>
      </a>
      <a class="row" href="https://samarthkulkarni16.github.io/logs_app_for_you/" target="_blank" rel="noopener">
        <span class="row-name">Daily Logs</span>
        <span class="arrow" aria-hidden="true">↗</span>
      </a>
      <a class="row" href="https://samarthkulkarni16.github.io/To-Do_App_for_you/" target="_blank" rel="noopener">
        <span class="row-name">To Do</span>
        <span class="arrow" aria-hidden="true">↗</span>
      </a>
      <a class="row" href="https://samarthkulkarni16.github.io/flow_timer_for_you/" target="_blank" rel="noopener">
        <span class="row-name">Flow Timer</span>
        <span class="arrow" aria-hidden="true">↗</span>
      </a>
    </div>
  </main>

  <footer>
    <a href="https://github.com/SamarthKulkarni16" target="_blank" rel="noopener">Samarth Kulkarni</a>
  </footer>
</div>

</body>
</html>
